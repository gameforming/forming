<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>BlockBlast Clone</title>
<style>
body { display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
canvas { background: #222; border: 2px solid #555; margin-bottom: 10px; }
button { padding: 10px 20px; font-size: 16px; margin-bottom:10px; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<button id="homeBtn">Terug naar Home</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRID_SIZE = 8;
const CELL_SIZE = canvas.width / GRID_SIZE;
const grid = Array(GRID_SIZE * GRID_SIZE).fill(null); // null = leeg

let tray = []; // 3 blokken die je kan plaatsen
let selectedBlock = null;
let offsetX=0, offsetY=0;
let score = 0;

// Blok vormen (alleen voorbeelden)
const shapes = [
    [[1]],           // 1x1
    [[1,1]],         // 2x1
    [[1,1,1]],       // 3x1
    [[1,1],[1,1]],   // 2x2
];

// Maak nieuwe tray
function newTray(){
    tray = [];
    for(let i=0;i<3;i++){
        let shape = shapes[Math.floor(Math.random()*shapes.length)];
        let block = {x: i*60+20, y: 350, shape, width: shape[0].length, height: shape.length, gridIndex:null};
        tray.push(block);
    }
}

// Tekenen
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Grid lijnen
    ctx.strokeStyle='#555';
    for(let i=0;i<=GRID_SIZE;i++){
        ctx.beginPath();
        ctx.moveTo(i*CELL_SIZE,0);
        ctx.lineTo(i*CELL_SIZE,canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0,i*CELL_SIZE);
        ctx.lineTo(canvas.width,i*CELL_SIZE);
        ctx.stroke();
    }

    // Grid blokken
    grid.forEach((b,i)=>{
        if(b){
            ctx.fillStyle = '#ff6600';
            for(let r=0;r<b.shape.length;r++){
                for(let c=0;c<b.shape[r].length;c++){
                    if(b.shape[r][c]===1){
                        ctx.fillRect((i%GRID_SIZE+c)*CELL_SIZE, Math.floor(i/GRID_SIZE+r)*CELL_SIZE, CELL_SIZE-2, CELL_SIZE-2);
                    }
                }
            }
        }
    });

    // Tray blokken
    tray.forEach(b=>{
        ctx.fillStyle = '#00ccff';
        for(let r=0;r<b.shape.length;r++){
            for(let c=0;c<b.shape[r].length;c++){
                if(b.shape[r][c]===1){
                    ctx.fillRect(b.x + c*CELL_SIZE, b.y + r*CELL_SIZE, CELL_SIZE-2, CELL_SIZE-2);
                }
            }
        }
    });

    // Score
    ctx.fillStyle='white';
    ctx.font='16px Arial';
    ctx.fillText('Score: '+score, 10, 20);
}

// Check of blok kan geplaatst worden
function canPlace(block,gx,gy){
    for(let r=0;r<block.height;r++){
        for(let c=0;c<block.width;c++){
            if(block.shape[r][c]===1){
                let x = gx+c;
                let y = gy+r;
                if(x<0||x>=GRID_SIZE||y<0||y>=GRID_SIZE) return false;
                if(grid[y*GRID_SIZE + x]) return false;
            }
        }
    }
    return true;
}

// Plaats blok
function placeBlock(block,gx,gy){
    for(let r=0;r<block.height;r++){
        for(let c=0;c<block.width;c++){
            if(block.shape[r][c]===1){
                grid[(gy+r)*GRID_SIZE + (gx+c)] = block;
            }
        }
    }
}

// Controleer volle rijen/kolommen
function checkFullLines(){
    // Rijen
    for(let y=0;y<GRID_SIZE;y++){
        let full = true;
        for(let x=0;x<GRID_SIZE;x++){
            if(!grid[y*GRID_SIZE + x]) full=false;
        }
        if(full){
            for(let x=0;x<GRID_SIZE;x++){
                grid[y*GRID_SIZE+x]=null;
            }
            score+=GRID_SIZE;
        }
    }
    // Kolommen
    for(let x=0;x<GRID_SIZE;x++){
        let full = true;
        for(let y=0;y<GRID_SIZE;y++){
            if(!grid[y*GRID_SIZE + x]) full=false;
        }
        if(full){
            for(let y=0;y<GRID_SIZE;y++){
                grid[y*GRID_SIZE+y*0+x]=null;
            }
            score+=GRID_SIZE;
        }
    }
}

// Mouse events
canvas.addEventListener('mousedown', e=>{
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    for(let b of tray){
        if(mx>b.x && mx<b.x + b.width*CELL_SIZE &&
           my>b.y && my<b.y + b.height*CELL_SIZE){
            selectedBlock = b;
            offsetX = mx - b.x;
            offsetY = my - b.y;
            break;
        }
    }
});

canvas.addEventListener('mousemove', e=>{
    if(selectedBlock){
        const rect = canvas.getBoundingClientRect();
        selectedBlock.x = e.clientX - rect.left - offsetX;
        selectedBlock.y = e.clientY - rect.top - offsetY;
        draw();
    }
});

canvas.addEventListener('mouseup', e=>{
    if(selectedBlock){
        let gx = Math.round(selectedBlock.x / CELL_SIZE);
        let gy = Math.round(selectedBlock.y / CELL_SIZE);
        if(canPlace(selectedBlock,gx,gy)){
            placeBlock(selectedBlock,gx,gy);
            checkFullLines();
            // verwijder geplaatst blok uit tray
            tray = tray.filter(b=>b!==selectedBlock);
            // als tray leeg, nieuwe blokken
            if(tray.length===0) newTray();
        } else {
            // terug naar tray
            selectedBlock.x = 20 + tray.indexOf(selectedBlock)*60;
            selectedBlock.y = 350;
        }
        selectedBlock=null;
        draw();
    }
});

// Home knop
document.getElementById('homeBtn').addEventListener('click', ()=>{
    window.location.href='gamforming.html';
});

// Start spel
newTray();
draw();
</script>
</body>
</html>
